name: Terraform Cloud Apply Run

on:
  pull_request:
    branches:
     ## RECOMMENDED: Change for your target branch, or include branches you wish to trigger this workflow file.
      - development

    types: [closed]
  workflow_dispatch:

env:
  TF_CLOUD_ORGANIZATION: "REPLACE_ORG" ## Name of your existing Terraform Cloud Organization. RECOMMENDED: use repository variables. ex. "${{ vars.TF_CLOUD_ORGANIZATION }}"
  TF_API_TOKEN: "${{ secrets.TERRAFORM_CLOUD_TOKEN }}" ## Terraform Cloud API Token. RECOMMENDED: replace with github action secrets. ex. "${{ secrets.TF_API_TOKEN }}"
  TF_WORKSPACE: "REPLACE_WORKSPACE" ## Name of your existing workspace in Terraform Cloud.
  CONFIG_DIRECTORY: '' ## Directory of your Terraform Configuration. Relative to the project root.

jobs:
  terraform-cloud-apply:
    if: github.event.pull_request.merged == true && (
          startsWith(github.head_ref, 'feature/') 
        )
    
    runs-on: 
      group: netdevops
    steps:
      - uses: actions/checkout@v3

      - uses: Network-DevOps/tfc-workflows-gitops/actions/upload-configuration@v1.0
        id: upload
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          directory: ${{ env.CONFIG_DIRECTORY }}

      - uses: Network-DevOps/tfc-workflows-gitops/actions/create-run@v1.0
        id: create-run
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
          
          
      - uses: Network-DevOps/tfc-workflows-gitops/actions/plan-output@v1.0
        # assign id attribute to reference in subsequent steps
        id: plan-output
        with:
          plan: ${{ steps.create-run.outputs.plan_id }}

      - name: Reference Plan Output
        run: |
          echo "Plan status: ${{ steps.plan-output.outputs.plan_status }}"
          echo "Resources to Add: ${{ steps.plan-output.outputs.add }}"
          echo "Resources to Change: ${{ steps.plan-output.outputs.change }}"
          echo "Resources to Destroy: ${{ steps.plan-output.outputs.destroy }}"
          echo "create plan:   ${{ fromJSON(steps.create-run.outputs.payload).data.attributes.actions.IsConfirmable }}"
      
      - name: Apply
        uses: Network-DevOps/tfc-workflows-gitops/actions/apply-run@v1.0
        if: fromJSON(steps.create-run.outputs.payload).data.attributes.actions.IsConfirmable
        id: apply
        # continue-on-error: true
        # if: github.ref == 'refs/heads/master'
        with:
          run: ${{ steps.create-run.outputs.run_id }}
          comment: "Apply Run from GitHub Actions CI ${{ github.sha }}"
